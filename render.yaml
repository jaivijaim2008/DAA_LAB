services:
  # Main multipage app
  - type: web
    name: daa-lab
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Lab 1 - Interpolation Search (standalone)
  - type: web
    name: daa-lab1-interpolation-search
